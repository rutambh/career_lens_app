<!DOCTYPE html>

<html class="dark" lang="en"><head>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #010810; /* Deep black canvas from style guide */
            color: #d9e4f0;
            overflow-x: hidden;
        }
        .glass-surface {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-button {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
        }
        .glow-button:active {
            transform: scale(0.96);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }
        .search-container:focus-within {
            border-color: rgba(173, 198, 255, 0.5);
            box-shadow: 0 0 0 1px rgba(173, 198, 255, 0.2);
        }
        .pulse-dot {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        .location-drawer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
        }
        .location-drawer.open {
            max-height: 300px;
            opacity: 1;
            margin-top: 16px;
        }
    </style>
<!-- Tailwind Config verbatrim -->

    body {
      min-height: max(884px, 100dvh);

<body class="antialiased select-none">
<!-- Background Atmospheric Effect -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-1/4 -right-1/4 w-[600px] h-[600px] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-1/4 -left-1/4 w-[500px] h-[500px] bg-secondary/5 blur-[100px] rounded-full"></div>
</div>
<!-- TopAppBar Section -->
<header class="fixed top-0 w-full z-50 bg-surface/10 dark:bg-surface-container-lowest/10 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-margin-mobile h-12">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[24px]">search</span>
<span class="font-headline-sm text-headline-sm font-bold text-on-background tracking-tight">HireScope</span>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden border border-white/20 active:scale-95 transition-transform cursor-pointer">
<img class="w-full h-full object-cover" data-alt="A professional close-up headshot of a modern software engineer in their late 20s, with soft natural lighting in a contemporary glass-walled office environment. The image uses a cool, tech-focused color palette of deep blues and subtle grays, matching a premium professional networking platform aesthetic. High resolution, shallow depth of field." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9Zm4GYn-7ksuwOVBFPevD3NMp-AmLKEY5zcZXFkYtEB_ca360wXaV3__u4zfDv-d0FyRaHE2J6zT-7l3nPRtG2GJ1uBFZBCnbP2G7ZFl8RIveHMb6hMclRiR8ugld6jS7up4Bd6Lh1JyBngy8ajwLFah48TmNFEXD9z13Z6mxWnJvUiy0gg9b5wZBBIVIYb35JbXtswXUDgXotAib1gYB0qr3bUqV7Tr7eKSGsDui4YJsWJ9_btlQN0ZKQhc3flzvRQYgbvX0hsM"/>
</div>
</header>
<!-- Main Canvas -->
<main class="relative z-10 pt-24 pb-32 px-margin-mobile min-h-screen flex flex-col items-center">
<!-- Hero Section -->
<div class="w-full mb-xl text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background mb-base">Find Your Value</h1>
<p class="font-body-md text-body-md text-on-surface-variant/80">Real-time market insights for the modern professional.</p>
</div>
<!-- Search Card -->
<div class="w-full glass-surface rounded-xl p-lg flex flex-col gap-lg">
<!-- Skill Search -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-primary uppercase">Current Focus</label>
<div class="search-container flex items-center bg-[#0F172A] border border-white/10 rounded-lg px-md h-12 transition-all">
<span class="material-symbols-outlined text-on-surface-variant mr-sm">work</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface font-body-md placeholder:text-on-surface-variant/40" placeholder="Role or Skills" type="text"/>
</div>
</div>
<!-- Location Toggle & Drawer -->
<div class="flex flex-col">
<button class="flex items-center justify-between w-full py-sm active:opacity-70 transition-opacity" id="locationToggle">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary">location_on</span>
<span class="font-body-md text-on-surface">Refine by Location</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant transition-transform" id="chevronIcon">expand_more</span>
</button>
<div class="location-drawer" id="locationDrawer">
<div class="grid grid-cols-2 gap-sm">
<div class="flex flex-col gap-xs">
<label class="text-[10px] text-on-surface-variant/60 font-bold uppercase pl-xs">State</label>
<select class="bg-[#1e293b] border border-white/5 rounded-lg h-10 px-xs text-body-sm text-on-surface appearance-none focus:ring-1 focus:ring-primary/40">
<option>California</option>
<option>New York</option>
<option>Texas</option>
<option>Remote</option>
</select>
</div>
<div class="flex flex-col gap-xs">
<label class="text-[10px] text-on-surface-variant/60 font-bold uppercase pl-xs">District/City</label>
<select class="bg-[#1e293b] border border-white/5 rounded-lg h-10 px-xs text-body-sm text-on-surface appearance-none focus:ring-1 focus:ring-primary/40">
<option>San Francisco</option>
<option>Los Angeles</option>
<option>Palo Alto</option>
<option>San Jose</option>
</select>
</div>
</div>
</div>
</div>
<!-- Primary CTA -->
<button class="glow-button w-full h-14 bg-primary text-on-primary font-headline-sm rounded-full flex items-center justify-center gap-sm mt-md">
<span>Start Research</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">insights</span>
</button>
</div>
<!-- Live Coverage Footer -->
<div class="mt-xl flex flex-col items-center gap-xs">
<div class="flex items-center gap-sm bg-surface-container/40 px-md py-xs rounded-full border border-white/5">
<div class="w-2 h-2 rounded-full bg-emerald-400 pulse-dot shadow-[0_0_8px_rgba(52,211,153,0.6)]"></div>
<span class="font-label-md text-label-md text-on-surface-variant">Live Coverage: 142k Active Data Nodes</span>
</div>
<p class="text-[10px] text-on-surface-variant/40 tracking-[0.2em] uppercase mt-xs">Updated 2m ago</p>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 w-full z-50 flex justify-center items-center pb-lg px-margin-mobile">
<div class="bg-surface-container/80 dark:bg-surface-container-low/80 backdrop-blur-2xl border border-white/10 shadow-xl rounded-full px-lg py-sm flex justify-around items-center w-full max-w-sm">
<div class="bg-secondary-container text-on-secondary-container rounded-full p-xs flex items-center justify-center transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">search</span>
</div>
<div class="text-on-surface-variant p-xs flex items-center justify-center hover:bg-white/5 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined">history</span>
</div>
<div class="text-on-surface-variant p-xs flex items-center justify-center hover:bg-white/5 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined">settings</span>
</div>
</div>
</nav>
<script>
        const locationToggle = document.getElementById('locationToggle');
        const locationDrawer = document.getElementById('locationDrawer');
        const chevronIcon = document.getElementById('chevronIcon');

        locationToggle.addEventListener('click', () => {
            const isOpen = locationDrawer.classList.toggle('open');
            chevronIcon.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
        });

        // Simple tactile scale effect on interaction
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => btn.style.transform = 'scale(0.98)');
            btn.addEventListener('touchend', () => btn.style.transform = 'scale(1)');
        });
    </script>
</body></html>
